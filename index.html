<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoFinder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUarbnLTwTjRkqmGstX12oCkWwLn33BySDqHa6saudrtgSgkKSp" crossorigin="anonymous">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a3e 0%, #16213e 25%, #0f3460 50%, #1a1a3e 75%, #0d0d2b 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            background: rgba(10, 10, 30, 0.6);
            backdrop-filter: blur(10px);
            color: white;
            padding: 2rem 0;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 2rem;
        }

        header .container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding-left: 1rem;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        header p {
            font-size: 1.1rem;
            margin-top: 0.5rem;
            opacity: 0.95;
        }

        main {
            padding: 0 1rem 2rem 1rem;
        }

        section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        section h2 {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .btn-custom {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-custom:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
            color: white;
            text-decoration: none;
        }

        .btn-custom:active {
            transform: translateY(0);
        }

        #photoPreview, #videoPreview, #takePhotoBtn {
            display: none;
        }

        #photoPreview, #videoPreview {
            width: 100%;
            max-height: 60vh; /* Maksymalnie 60% wysokości ekranu, by obraz zawsze był widoczny bez scrollowania */
            margin: 1rem auto 0;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            object-fit: contain; /* Magiczne słowo: wpasowuje CAŁY obraz w ramki, bez ucinania (najwyżej doda czarne tło) */
            background: #000;
        }

        #takePhotoBtn {
            margin-top: 0.9rem;
        }

        #map {
            width: min(100%, 960px);
            height: clamp(260px, 42vh, 460px);
            margin: 0 auto;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        #coords-display {
            font-size: 1.1rem;
            color: #667eea;
            font-weight: 500;
            margin-bottom: 1rem;
        }

        #share-section {
            display: none;
            width: fit-content;
            min-width: 50%;
            margin: 0 auto;
            justify-content: center;
            align-items: center;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            header p {
                font-size: 1rem;
            }

            section {
                padding: 1rem;
            }

            section h2 {
                font-size: 1.25rem;
            }

            #map {
                height: clamp(240px, 38vh, 340px);
            }

            #share-section {
                min-width: 90%;
            }
        }
    </style>
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header>
        <div class="container ">
            <h1>🌍 GeoFinder</h1>
            <p>Znajdź, zrób zdjęcie i udostępnij!</p>
        </div>
    </header>

    <main class="container">
        <div class="row">
            <div class="col-lg-6 col-md-12">
                <section id="camera-section">
                    <h2>📸 Twoje znalezisko</h2>
                    <button id="openCameraBtn" class="btn btn-custom w-100 mb-3">Zrób zdjęcie znaleziska</button>
                    <video id="videoPreview" autoplay playsinline class="w-100"></video>
                    <button id="takePhotoBtn" class="btn btn-custom w-100 mb-3">✓ Zrób zdjęcie</button>
                    <img id="photoPreview" src="" alt="Podgląd zdjęcia" class="w-100">
                </section>
            </div>

            <div class="col-lg-6 col-md-12">
                <section id="map-section">
                    <h2>📍 Lokalizacja GPS</h2>
                    <p id="coords-display">Współrzędne: Brak danych</p>
                    <div id="map"></div>
                </section>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-12">
                <section id="share-section" class="text-center">
                    <button id="shareBtn" class="btn btn-custom" style="display: none;">🚀 Udostępnij znalezisko</button>
                </section>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWbSxccPQtF3EpF3fnJHog6LaEVF6+DmAhsHvD7/13eNs7PjR" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="app.js"></script>
</body>
</html>
