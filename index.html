<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoFinder</title>
    <style>
        #photoPreview, #videoPreview, #takePhotoBtn { display: none; }
        #photoPreview { width: 100%; max-width: 300px; margin-top: 10px; border-radius: 8px; }
        #videoPreview { width: 100%; max-width: 300px; margin-top: 10px; border-radius: 8px; }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>
    <header>
        <h1>GeoFinder</h1>
        <p>Znajdź, zrób zdjęcie i udostępnij!</p>
    </header>
    <main>
        <section id="camera-section">
            <h2>Twoje znalezisko</h2>
            <button id="openCameraBtn">Zrób zdjęcie znaleziska</button>
            <video id="videoPreview" autoplay playsinline></video>
            <button id="takePhotoBtn">Zrób zdjęcie</button>
            <br>
            <img id="photoPreview" src="" alt="Podgląd zdjęcia">
        </section>
        <section id="map-section">
            <h2>Lokalizacja GPS</h2>
            <p id="coords-display">Współrzędne: Brak danych</p>
            <div id="map" style="height: 300px; background-color: #eee; border: 1px solid #ccc;">
                Miejsce na mapę
            </div>
        </section>
        <section id="share-section">
            <button id="shareBtn" style="display: none; padding: 10px 20px; font-size: 16px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">Udostępnij znalezisko</button>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
